name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only the deploy job needs Pages write / id-token; the build job just reads
# the repo (and the ATen Release asset). Splitting the two means a transient
# Pages-deploy failure is retried on its own — the hours-of-CI build job is
# NOT re-run (mirrors wasthon's test/deploy split).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The full ATen build takes hours on a 4-vCPU runner: the compiled
      # libraries + generated headers are published ONCE as the `aten-wasm`
      # Release asset (produced from source by rebuild-aten.yml) and reused
      # here. Everything torch-python-side (the ~150 binding TUs, the link,
      # the VFS) is rebuilt from source on every push (~15 min).
      - name: Download ATen build (Release asset)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build
          # GitHub's release-asset API throws transient 503s ("No server is
          # currently available"); a single blip shouldn't fail the whole
          # build job. Retry with backoff, then assert the asset arrived.
          for i in 1 2 3 4 5 6; do
            gh release download aten-wasm -p 'aten-wasm-*.tar.zst' -D build \
              -R "$GITHUB_REPOSITORY" && break
            echo "ATen download attempt $i failed (transient?); retrying in 20s…"
            sleep 20
          done
          ls build/aten-wasm-*.tar.zst

      # Content-hashed compiler cache: pushes that touch neither the
      # binding TUs nor the headers drop the ~25 min compile to ~2 min.
      - name: ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: bindings-ccache-${{ github.run_id }}
          restore-keys: bindings-ccache-

      - name: Build bindings + link + VFS
        run: |
          sudo apt-get install -y ccache zstd
          export EM_COMPILER_WRAPPER=ccache
          ./build.sh ci

      # Pages layout: /loader/index.html references ../build/*, so both
      # directories sit side by side under the site root. The wasm ships as
      # <95 MB parts (Pages file-size limit); the loader reassembles them.
      - name: Stage site
        run: |
          mkdir -p _site/build
          cp -r loader _site/loader
          cp build/npth.mjs build/torch_vfs.js \
             build/wasthon-full.mjs build/wasthon-full.wasm _site/build/
          # NumBry numpy artifacts (fetched by the build's numbry stage) — the
          # dashboard loads them alongside torch; without this copy they 404 and
          # every numpy-dependent suite fails "No module named numpy"
          cp build/numpy_vfs.js build/nprnd.mjs build/nprnd.wasm \
             build/sympy_vfs.js _site/build/
          # single wasm when it fits under the Pages ceiling, else the parts
          if ls build/npth.wasm.part* >/dev/null 2>&1; then
            cp build/npth.parts.json build/npth.wasm.part* _site/build/
          else
            cp build/npth.wasm _site/build/
          fi
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=loader/">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
